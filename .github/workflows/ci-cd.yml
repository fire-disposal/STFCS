name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  # 新增：预处理阶段，计算小写镜像名
  prepare:
    runs-on: ubuntu-latest
    outputs:
      server_image: ${{ steps.set-image.outputs.image }}
    steps:
      - name: Set image tag (lowercase)
        id: set-image
        run: |
          LOWERED=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${LOWERED}-server" >> $GITHUB_OUTPUT

  # 1. 检查阶段
  lint:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Environment
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "pnpm"
      - name: Install & Check
        run: |
          pnpm install --frozen-lockfile
          pnpm lint && pnpm typecheck

  # 2. 构建阶段
  build:
    needs: [prepare, lint] # 依赖 prepare 获取变量
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/server/Dockerfile
          push: true
          # 引用 prepare job 的输出
          tags: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.server_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3. 部署阶段
  deploy:
    needs: [prepare, build] # 依赖 prepare 获取变量
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Remote Deploy
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << EOF
            cd ~/stfcs
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ needs.prepare.outputs.server_image }}:latest
            docker-compose up -d
            docker image prune -f
          EOF

      - name: Health Check
        run: |
          sleep 10
          curl -f http://${{ secrets.SERVER_HOST }}:3000/health