name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  PNPM_VERSION: 10.32.1
  NODE_VERSION: 24

jobs:
  validate:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lint
        run: pnpm run lint

      - name: Run Typecheck
        run: pnpm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Tests
        run: pnpm run test

  prepare:
    name: Prepare Environment
    needs: [validate, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    outputs:
      server_image: ${{ steps.set-images.outputs.server_image }}
      client_image: ${{ steps.set-images.outputs.client_image }}
    steps:
      - name: Set image tags
        id: set-images
        run: |
          LOWERED=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "server_image=${LOWERED}-server" >> $GITHUB_OUTPUT
          echo "client_image=${LOWERED}-client" >> $GITHUB_OUTPUT

  build:
    name: Build & Push Images
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.server_image }}:latest
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.server_image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Client
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/client/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.client_image }}:latest
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.client_image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMMIT_SHA=${{ github.sha }}

  deploy:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker system prune -af
            docker pull ${{ env.REGISTRY }}/${{ needs.prepare.outputs.server_image }}:latest
            docker pull ${{ env.REGISTRY }}/${{ needs.prepare.outputs.client_image }}:latest
            docker rm -f stfcs-server stfcs-client || true
            docker network create stfcs-network 2>/dev/null || true
            docker run -d --name stfcs-server --restart unless-stopped --network stfcs-network \
              -p 2567:2567 -e NODE_ENV=production -e PORT=2567 \
              ${{ env.REGISTRY }}/${{ needs.prepare.outputs.server_image }}:latest
            docker run -d --name stfcs-client --restart unless-stopped --network stfcs-network \
              -p 80:80 ${{ env.REGISTRY }}/${{ needs.prepare.outputs.client_image }}:latest
            sleep 5
            docker ps --filter name=stfcs
          EOF

      - name: Health Check
        run: |
          for i in $(seq 1 12); do
            curl -fsS --max-time 5 http://${{ secrets.SERVER_HOST }}:2567/health && exit 0
            sleep 5
          done
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "docker logs --tail 50 stfcs-server"
          exit 1