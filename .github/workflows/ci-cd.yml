name: Manual CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      skip_checks:
        description: "Skip lint & tests"
        required: false
        default: "false"
      deploy:
        description: "Run deployment"
        required: false
        default: "true"

concurrency:
  group: manual-cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  PNPM_VERSION: 10.32.1
  NODE_VERSION: 24
  HOST_PORT: 2567
  APP_PORT: 3001
  CORS_ORIGINS: "*"

jobs:
  check:
    name: Lint + Typecheck + Test
    if: ${{ github.event.inputs.skip_checks != 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

  prepare:
    name: Prepare Metadata
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Set image name
        id: meta
        run: |
          LOWERED=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${LOWERED}-app" >> $GITHUB_OUTPUT

  build:
    name: Build & Push Image
    needs: [prepare, check]
    if: always()
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.unified
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image }}:latest
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image }}:${{ github.sha }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.REGISTRY }}/${{ needs.prepare.outputs.image }}:latest
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: build
    if: ${{ github.event.inputs.deploy == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy via SSH
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            docker pull ghcr.io/${{ github.repository }}-app:latest

            docker rm -f stfcs-app || true
            docker network create stfcs-network 2>/dev/null || true

            mkdir -p /srv/stfcs/storage/players
            mkdir -p /srv/stfcs/storage/assets/ships
            mkdir -p /srv/stfcs/storage/assets/weapons

            docker run -d \
              --name stfcs-app \
              --restart unless-stopped \
              --network stfcs-network \
              -p ${{ env.HOST_PORT }}:${{ env.APP_PORT }} \
              -e NODE_ENV=production \
              -e PORT=${{ env.APP_PORT }} \
              -e CORS_ORIGINS='${{ env.CORS_ORIGINS }}' \
              -v /srv/stfcs/storage:/app/storage \
              ghcr.io/${{ github.repository }}-app:latest

            sleep 5
            docker ps --filter name=stfcs-app
          EOF

      - name: Health Check
        run: |
          for i in $(seq 1 12); do
            curl -fsS --max-time 5 http://${{ secrets.SERVER_HOST }}:${{ env.HOST_PORT }}/health && exit 0
            sleep 5
          done

          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "docker logs --tail 50 stfcs-app"

          exit 1