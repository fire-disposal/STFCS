name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  # 新增：预处理阶段，计算小写镜像名
  prepare:
    runs-on: ubuntu-latest
    outputs:
      server_image: ${{ steps.set-image.outputs.image }}
    steps:
      - name: Set image tag (lowercase)
        id: set-image
        run: |
          LOWERED=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${LOWERED}-server" >> $GITHUB_OUTPUT

  # 1. 检查阶段
  lint:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Environment
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "pnpm"
      - name: Install & Check
        run: |
          pnpm install --frozen-lockfile
          pnpm lint && pnpm typecheck

  # 2. 构建阶段
  build:
    needs: [prepare, lint] # 依赖 prepare 获取变量
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/server/Dockerfile
          push: true
          # 引用 prepare job 的输出
          tags: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.server_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3. 部署阶段
  deploy:
    needs: [prepare, build] # 依赖 prepare 获取变量
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Remote Deploy
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -euo pipefail
            mkdir -p ~/stfcs
            cd ~/stfcs
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ needs.prepare.outputs.server_image }}:latest
            # Remove existing container if present
            if docker ps -a --format '{{.Names}}' | grep -q '^stfcs-server$'; then
              docker rm -f stfcs-server || true
            fi
            # Run server container (serves static client files from image)
            docker run -d \
              --name stfcs-server \
              --restart unless-stopped \
              -p 3000:3000 -p 3001:3001 \
              -e NODE_ENV=production \
              -e HTTP_PORT=3000 \
              -e WS_PORT=3001 \
              -e CORS_ORIGINS=https://stfcs.205716.xyz \
              ${{ env.REGISTRY }}/${{ needs.prepare.outputs.server_image }}:latest
            docker ps --filter name=stfcs-server --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            docker logs --tail 200 stfcs-server || true
          EOF

      - name: Health Check
        run: |
          # Retry health check up to ~60s
          for i in $(seq 1 12); do
            if curl -fsS http://${{ secrets.SERVER_HOST }}:3000/health; then
              echo "service healthy"; exit 0
            fi
            sleep 5
          done
          echo "Health check failed after retries. Gathering remote container status and logs..."
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "docker ps -a --filter name=stfcs-server --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' && docker logs --tail 500 stfcs-server" || true
          exit 1