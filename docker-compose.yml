# =============================================
# STFCS Docker Compose
# Production Deployment Configuration
# =============================================

version: '3.8'

services:
  server:
    image: ${SERVER_IMAGE:-ghcr.io/fire-disposal/stfcs-server}:${IMAGE_TAG:-latest}
    container_name: stfcs-server
    restart: unless-stopped
    ports:
      - "2567:2567"  # WebSocket and HTTP API
    environment:
      - NODE_ENV=production
      - PORT=2567
      - CORS_ORIGINS=https://stfcs.yourdomain.com
      - LOG_LEVEL=info
    networks:
      - stfcs-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:2567/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  client:
    image: ${CLIENT_IMAGE:-ghcr.io/fire-disposal/stfcs-client}:${IMAGE_TAG:-latest}
    container_name: stfcs-client
    restart: unless-stopped
    ports:
      - "80:80"  # HTTP
    depends_on:
      - server
    networks:
      - stfcs-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

networks:
  stfcs-network:
    driver: bridge
