# =============================================
# STFCS Docker Compose
# Production Deployment Configuration
# =============================================

version: '3.8'

services:
  server:
    image: ghcr.io/fire-disposal/stfcs-server:latest
    container_name: stfcs-server
    restart: unless-stopped
    ports:
      - "3000:3000"  # HTTP API
      - "3001:3001"  # WebSocket
    environment:
      - NODE_ENV=production
      - HTTP_PORT=3000
      - WS_PORT=3001
      - CORS_ORIGINS=https://stfcs.yourdomain.com
      - LOG_LEVEL=info
      - MAX_PLAYERS_PER_ROOM=8
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - stfcs-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  client:
    image: ghcr.io/fire-disposal/stfcs-client:latest
    container_name: stfcs-client
    restart: unless-stopped
    ports:
      - "8080:80"  # Nginx serving built files
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - stfcs-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

networks:
  stfcs-network:
    driver: bridge
