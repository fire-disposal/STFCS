# =============================================
# STFCS Docker Compose
# Production Deployment Configuration
# =============================================

version: '3.8'

services:
  app:
    image: ${APP_IMAGE:-ghcr.io/fire-disposal/stfcs-app}:${IMAGE_TAG:-latest}
    container_name: stfcs-app
    restart: unless-stopped
    ports:
      - "2567:2567"  # HTTP & WebSocket & Static Assets
    environment:
      - NODE_ENV=production
      - PORT=2567
      - CORS_ORIGINS=https://stfcs.205716.xyz
      - LOG_LEVEL=info
    networks:
      - stfcs-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:2567/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

networks:
  stfcs-network:
    driver: bridge
