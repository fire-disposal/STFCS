# =============================================
# STFCS Docker Compose
# Production Deployment Configuration
# =============================================

version: '3.8'

services:
  app:
    image: ${APP_IMAGE:-ghcr.io/fire-disposal/stfcs-app}:${IMAGE_TAG:-latest}
    container_name: stfcs-app
    restart: unless-stopped
    ports:
      - "2567:3001"  # Host 2567 -> App 3001
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGINS=*
      - LOG_LEVEL=info
    networks:
      - stfcs-network
    volumes:
      - /srv/stfcs/storage:/app/storage
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

networks:
  stfcs-network:
    driver: bridge
