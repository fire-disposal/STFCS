<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#aaccff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <rect width="100" height="100" fill="url(#bgGradient)" rx="16"/>
  
  <circle cx="20" cy="25" r="1.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="75" cy="20" r="1" fill="#aaccff" opacity="0.8"/>
  <circle cx="30" cy="70" r="1.2" fill="#ffffff" opacity="0.7"/>
  <circle cx="80" cy="75" r="1.5" fill="#aaccff" opacity="0.9"/>
  <circle cx="15" cy="50" r="0.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="60" cy="15" r="1" fill="#ffffff" opacity="0.8"/>
  
  <ellipse cx="50" cy="50" rx="35" ry="12" fill="url(#starGlow)" transform="rotate(-30 50 50)"/>
  
  <text x="50" y="62" font-size="48" text-anchor="middle" dominant-baseline="middle">🌌</text>
</svg>
