server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/xml+rss application/json;

# 1. 精准匹配 Colyseus 的 HTTP 握手路径
    location /matchmake {
        proxy_pass http://stfcs-server:2567;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 2. 匹配 Colyseus 的 WebSocket 房间连接
    # 如果路径不是以常见静态资源后缀结尾，且包含多级结构或 ID 结构，则尝试作为 WS 转发
    location ~ ^/([a-zA-Z0-9_-]+)(/.*)?$ {
        # 如果是带有 WebSocket 升级头的请求，强制转发到后端
        if ($http_upgrade = "websocket") {
            proxy_pass http://stfcs-server:2567;
        }

        # 否则，如果是静态资源请求（如 .js, .css），让它继续尝试文件匹配
        # 如果既不是 WS 也不是文件，最后由 location / 处理到 index.html
        try_files $uri $uri/ @proxy_to_server;
    }

    # 辅助兜底转发
    location @proxy_to_server {
        proxy_pass http://stfcs-server:2567;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # 3. 静态资源处理
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy WebSocket connections to server (Legacy/Explicit)
    location /ws {
        proxy_pass http://stfcs-server:2567;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Proxy API requests to server (optional, for future REST API)
    location /api {
        proxy_pass http://stfcs-server:2567;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://stfcs-server:2567;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
